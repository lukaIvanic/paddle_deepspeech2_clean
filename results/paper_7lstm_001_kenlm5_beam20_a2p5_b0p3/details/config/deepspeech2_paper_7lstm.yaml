# DeepSpeech2 paper-depth LSTM comparison within unmodified PaddleSpeech limits.
#
# Same as conf/deepspeech2_paper_7gru.yaml except use_gru is False.
# In PaddleSpeech's actual DS2 implementation, use_gru: False selects nn.LSTM,
# not a vanilla/simple RNN despite the stale source docstring.
###########################################
#                   Data                  #
###########################################
train_manifest: data/manifest.train
dev_manifest: data/manifest.dev
test_manifest: data/manifest.test
min_input_len: 0.0
max_input_len: 30.0
min_output_len: 0.0
max_output_len: 400.0
min_output_input_ratio: 0.05
max_output_input_ratio: 10.0


###########################################
#              Dataloader                 #
###########################################
vocab_filepath: data/lang_char/vocab.txt
spm_model_prefix: ''
unit_type: 'char'
preprocess_config: conf/preprocess.yaml
feat_dim: 161
stride_ms: 10.0
window_ms: 25.0
sortagrad: 0
batch_size: 32
maxlen_in: 512
maxlen_out: 150
minibatches: 0
batch_count: auto
batch_bins: 0
batch_frames_in: 0
batch_frames_out: 0
batch_frames_inout: 0
num_workers: 8
subsampling_factor: 1
num_encs: 1


############################################
#           Network Architecture           #
############################################
num_conv_layers: 2
num_rnn_layers: 7
rnn_layer_size: 650
rnn_direction: bidirect
num_fc_layers: 0
fc_layers_size_list: -1,
use_gru: False
blank_id: 0


###########################################
#                Training                 #
###########################################
n_epoch: 20
accum_grad: 1
lr: 5.0e-4
lr_decay: 0.93
weight_decay: 1.0e-6
global_grad_clip: 5.0
dist_sampler: False
log_interval: 20
checkpoint:
  kbest_n: 10
  latest_n: 5
